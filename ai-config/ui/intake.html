<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Guided Foundations Intake | Whole Body Reset</title>

  <!-- GLOBAL SITE STYLES -->
  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
      display: flex;
      align-items: center;
    }

    header img {
      height: 48px;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.6rem;
      margin-top: 40px;
    }

    p {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-top: 25px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #b9b29a;
      background: #fff;
    }

    textarea {
      min-height: 90px;
    }

    .gentle {
      font-style: italic;
      color: #4a5a4a;
    }

    .submit-wrap {
      margin-top: 50px;
    }

    button {
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    footer {
      margin-top: 80px;
      padding: 40px 20px;
      background: #e2d6b8;
      font-size: 0.9rem;
      color: #4f5a45;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- LEAFY BACKGROUND PLACEHOLDERS -->
<div class="leafy-left"></div>
<div class="leafy-right"></div>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Guided Foundations Intake</h1>

  <p class="gentle">
    This intake helps the system understand your current state.
    There are no right answers.
    Please respond as clearly and honestly as you can.
  </p>

  <form action="/intake/results.html" method="POST">

    <label>1. What symptoms or experiences are most noticeable right now?</label>
    <textarea name="current_symptoms" required></textarea>

    <label>2. How long have these symptoms been present?</label>
    <select name="symptom_duration" required>
      <option value="">Select one</option>
      <option>Days</option>
      <option>Weeks</option>
      <option>Months</option>
      <option>Years</option>
      <option>On and off</option>
    </select>

    <label>3. How would you describe the intensity overall?</label>
    <select name="symptom_intensity" required>
      <option value="">Select one</option>
      <option>Mild</option>
      <option>Moderate</option>
      <option>Intense</option>
      <option>Fluctuating</option>
    </select>

    <label>4. Have you noticed any patterns?</label>
    <textarea name="pattern_observations"></textarea>

    <label>5. Are you currently using any supports? (hydration, minerals, binders, herbs, diet changes)</label>
    <textarea name="current_supports"></textarea>

    <label>6. Are you taking any medications or under care for a diagnosed condition?</label>
    <textarea name="medications_and_conditions"></textarea>

    <label>7. How does your body usually respond to changes?</label>
    <select name="tolerance_and_capacity" required>
      <option value="">Select one</option>
      <option>Easily overwhelmed</option>
      <option>Sensitive to changes</option>
      <option>Generally stable</option>
      <option>Able to tolerate slow additions</option>
    </select>

    <label>8. What are you hoping to understand right now?</label>
    <textarea name="goals_and_intent" required></textarea>

    <div class="submit-wrap">
      <button type="submit">Continue to Reflection</button>
    </div>

  </form>

</main>

<footer>
  <p>© ET Naturals. All rights reserved.</p>
  <p>Educational content only. No medical claims.</p>
</footer>

</body>
</html>
