<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Guided Foundations Intake | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header { background: #e2d6b8; padding: 20px 40px; }
    header img { height: 48px; }
    main { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    label { display: block; margin-top: 20px; font-weight: bold; }
    textarea, select, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }
    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Guided Foundations Intake</h1>

  <form id="intakeForm">

    <label>Email</label>
    <input type="email" name="email" required>

    <label>What are you experiencing?</label>
    <textarea name="current_symptoms" required></textarea>

    <label>Intensity</label>
    <select name="symptom_intensity" required>
      <option value="">Select</option>
      <option>Mild</option>
      <option>Moderate</option>
      <option>Intense</option>
    </select>

    <label>Tolerance</label>
    <select name="tolerance_and_capacity" required>
      <option value="">Select</option>
      <option>Easily overwhelmed</option>
      <option>Sensitive to changes</option>
      <option>Generally stable</option>
    </select>

    <label>Medications</label>
    <textarea name="current_meds"></textarea>

    <button type="submit">Generate My Plan</button>

  </form>

</main>

<script>
document.getElementById("intakeForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target).entries());

  // 🔑 SAVE ORIGINAL INTAKE
  sessionStorage.setItem("intake_payload", JSON.stringify(data));

  const res = await fetch("/.netlify/functions/ai-evaluate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  sessionStorage.setItem("ai_result", JSON.stringify(result));
  window.location.href = "/ai-config/ui/results.html";
});
</script>

</body>
</html>
