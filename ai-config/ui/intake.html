<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guided Foundations Intake | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    header img { height: 48px; }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    button[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>
  <h1>Guided Foundations Intake</h1>

  <form id="intakeForm">

    <label>Email</label>
    <input type="email" name="email" required>

    <label>What are you experiencing?</label>
    <textarea name="current_symptoms" rows="4" required></textarea>

    <label>Intensity</label>
    <select name="symptom_intensity" required>
      <option value="">Select</option>
      <option>Mild</option>
      <option>Moderate</option>
      <option>Intense</option>
    </select>

    <label>Tolerance</label>
    <select name="tolerance_and_capacity" required>
      <option value="">Select</option>
      <option>Easily overwhelmed</option>
      <option>Sensitive to changes</option>
      <option>Generally stable</option>
    </select>

    <label>Medications</label>
    <textarea name="current_meds" rows="3"></textarea>

    <button type="submit" id="submitBtn">
      <span class="btn-text">Generate My Plan</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>
</main>

<script>
const form = document.getElementById("intakeForm");
const btn = document.getElementById("submitBtn");
const spinner = document.getElementById("spinner");
const btnText = btn.querySelector(".btn-text");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.disabled = true;
  spinner.style.display = "inline-block";
  btnText.textContent = "Working…";

  const data = Object.fromEntries(new FormData(form).entries());

  try {
    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("AI request failed");

    const result = await res.json();

    sessionStorage.setItem("ai_result", JSON.stringify(result));

    // HARD GUARANTEE storage exists
    if (!sessionStorage.getItem("ai_result")) {
      throw new Error("Session storage failed");
    }

    window.location.href = "/ai-config/ui/results.html";

  } catch (err) {
    alert("Unable to generate plan. Please try again.");
    console.error(err);

    btn.disabled = false;
    spinner.style.display = "none";
    btnText.textContent = "Generate My Plan";
  }
});
</script>

</body>
</html>
