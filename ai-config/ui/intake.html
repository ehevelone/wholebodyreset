<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Guided Foundations Intake | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
      display: flex;
      align-items: center;
    }
    header img { height: 48px; }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 { font-size: 2.4rem; }
    label {
      display: block;
      margin-top: 25px;
      font-weight: 600;
    }
    textarea, select {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #b9b29a;
      font-family: inherit;
    }
    textarea { min-height: 90px; }
    .gentle { font-style: italic; color: #4a5a4a; }
    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }
    footer {
      margin-top: 80px;
      padding: 40px 20px;
      background: #e2d6b8;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="leafy-left"></div>
<div class="leafy-right"></div>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Guided Foundations Intake</h1>

  <p class="gentle">
    Answer honestly. Nothing here triggers action.
  </p>

  <!-- TEMP TEST FLOW -->
  <form action="/intake/result.html" method="GET">

    <label>1. What symptoms or experiences are most noticeable right now?</label>
    <textarea name="current_symptoms" required></textarea>

    <label>2. How long have these symptoms been present?</label>
    <select name="symptom_duration" required>
      <option value="">Select</option>
      <option>Days</option>
      <option>Weeks</option>
      <option>Months</option>
      <option>Years</option>
      <option>On and off</option>
    </select>

    <label>3. Overall intensity?</label>
    <select name="symptom_intensity" required>
      <option value="">Select</option>
      <option>Mild</option>
      <option>Moderate</option>
      <option>Intense</option>
      <option>Fluctuating</option>
    </select>

    <label>4. Noticed any patterns?</label>
    <textarea name="pattern_observations"></textarea>

    <label>5. Current supports?</label>
    <textarea name="current_supports"></textarea>

    <label>6. Medications or conditions?</label>
    <textarea name="medications_and_conditions"></textarea>

    <label>7. How do you tolerate changes?</label>
    <select name="tolerance_and_capacity" required>
      <option value="">Select</option>
      <option>Easily overwhelmed</option>
      <option>Sensitive to changes</option>
      <option>Generally stable</option>
      <option>Able to tolerate slow additions</option>
    </select>

    <label>8. What are you hoping to understand?</label>
    <textarea name="goals_and_intent" required></textarea>

    <!-- TEMP: force test state -->
    <input type="hidden" name="state" value="hold_steady">

    <button type="submit">Continue to Reflection</button>
  </form>

</main>

<footer>
  <p>© ET Naturals. All rights reserved.</p>
</footer>

</body>
</html>
