<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Reflection | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
      display: flex;
      align-items: center;
    }
    header img { height: 48px; }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 { font-size: 2.4rem; }
    .gentle { font-style: italic; color: #4a5a4a; }
    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 24px;
      margin: 35px 0;
    }
    .print-actions { margin-top: 40px; }
    button {
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }
    footer {
      margin-top: 80px;
      padding: 40px 20px;
      background: #e2d6b8;
      font-size: 0.9rem;
      text-align: center;
    }
    @media print {
      header, footer, .leafy-left, .leafy-right, .print-actions {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="leafy-left"></div>
<div class="leafy-right"></div>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

<h1>Your Guided Reflection</h1>

<p class="gentle">
This reflection is based on what you shared.
Nothing here requires action.
</p>

<div id="aiReflection" class="callout">
Loading reflection…
</div>

<div class="print-actions">
<button onclick="window.print()">Print This Reflection</button>
</div>

</main>

<footer>
<p>© ET Naturals. All rights reserved.</p>
</footer>

<script>
(async function () {
  const payload = sessionStorage.getItem("intakePayload");
  if (!payload) {
    document.getElementById("aiReflection").innerText =
      "No intake data found.";
    return;
  }

  const res = await fetch("/.netlify/functions/ai-engine", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: payload
  });

  const data = await res.json();

  document.getElementById("aiReflection").innerText = data.reflection;
})();
</script>

</body>
</html>
