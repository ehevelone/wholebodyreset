<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Reflection | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }
    header img { height: 48px; }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 24px;
      margin: 35px 0;
    }
    .gentle { font-style: italic; color: #4a5a4a; }
    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }
    @media print {
      header, button { display: none; }
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Your Guided Reflection</h1>
  <p class="gentle">Nothing here requires action.</p>

  <div id="output" class="callout"></div>

  <button onclick="window.print()">Print This Reflection</button>

</main>

<script>
const data = JSON.parse(sessionStorage.getItem("ai_result") || "{}");

if (!data.output_state) {
  document.getElementById("output").innerHTML =
    "<p>Unable to load reflection. Please restart intake.</p>";
} else {
  document.getElementById("output").innerHTML = `
    <h2>Current State: ${data.output_state.replace(/_/g," ")}</h2>
    <p>${data.message}</p>
    <p class="gentle">No changes are required. This is informational only.</p>
  `;
}
</script>

</body>
</html>
