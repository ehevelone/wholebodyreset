<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Guided Foundations Intake | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
      display: flex;
      align-items: center;
    }
    header img {
      height: 48px;
    }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 { font-size: 2.4rem; }
    h2 { font-size: 1.4rem; margin-top: 45px; }
    label { display: block; margin-top: 20px; font-weight: bold; }
    textarea, select, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }
    .gentle { font-style: italic; color: #4a5a4a; }
    .section-note { font-size: .95rem; color: #4f5a45; }
    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      gap: 10px;
      align-items: center;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

<h1>Guided Foundations Intake</h1>

<p class="gentle">This intake helps the system understand your current state.</p>

<form id="intakeForm">

  <!-- SYSTEM CONTEXT -->
  <input type="hidden" name="session_type" value="initial">
  <input type="hidden" name="entry_context" value="foundation">

  <h2>Email</h2>
  <input type="email" name="email" required>

  <h2>Current symptoms</h2>
  <textarea name="current_symptoms" rows="4" required></textarea>

  <h2>Intensity</h2>
  <select name="symptom_intensity" required>
    <option value="">Select</option>
    <option>Mild</option>
    <option>Moderate</option>
    <option>Intense</option>
  </select>

  <h2>Tolerance</h2>
  <select name="tolerance_and_capacity" required>
    <option value="">Select</option>
    <option>Easily overwhelmed</option>
    <option>Sensitive to changes</option>
    <option>Generally stable</option>
  </select>

  <button id="submitBtn">
    <span class="btn-text">Generate My Plan</span>
    <span class="spinner" id="spinner"></span>
  </button>

</form>

</main>

<script>
document.getElementById("intakeForm").addEventListener("submit", async e => {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  const spinner = document.getElementById("spinner");
  const text = btn.querySelector(".btn-text");

  btn.disabled = true;
  spinner.style.display = "inline-block";
  text.textContent = "Generating…";

  const data = Object.fromEntries(new FormData(e.target).entries());

  try {
    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    sessionStorage.setItem("ai_result", JSON.stringify(result));
    window.location.href = "/ai-config/ui/results.html";
  } catch {
    alert("Error generating plan.");
    btn.disabled = false;
    spinner.style.display = "none";
    text.textContent = "Generate My Plan";
  }
});
</script>

</body>
</html>
