<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guided Foundations Intake | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    textarea, select, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }
    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" height="48">
</header>

<main>

<h1>Guided Foundations Intake</h1>

<form id="intakeForm">

  <input type="email" name="email" placeholder="you@example.com" required>

  <h2>What are you experiencing?</h2>
  <textarea name="current_symptoms" rows="4" required></textarea>

  <h2>Intensity</h2>
  <select name="symptom_intensity" required>
    <option value="">Select</option>
    <option>Mild</option>
    <option>Moderate</option>
    <option>Intense</option>
  </select>

  <h2>Tolerance</h2>
  <select name="tolerance_and_capacity" required>
    <option value="">Select</option>
    <option>Easily overwhelmed</option>
    <option>Sensitive to changes</option>
    <option>Generally stable</option>
  </select>

  <button type="submit">Generate My Plan</button>

</form>

</main>

<script>
document.getElementById("intakeForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target).entries());

  try {
    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    // 🔒 USE LOCAL STORAGE (NOT SESSION)
    localStorage.setItem("ai_result", JSON.stringify(json));

    window.location.href = "/ai-config/ui/results.html";

  } catch (err) {
    alert("Unable to generate your plan.");
    console.error(err);
  }
});
</script>

</body>
</html>
