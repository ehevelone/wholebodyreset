<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #efe4c9;
      color: #2f3b2f;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .callout {
      background: #d6cfb2;
      padding: 28px;
      border-radius: 14px;
    }
    h2 { margin-top: 30px; }
    h3 { margin-top: 26px; }
    ul { padding-left: 22px; }
    .supplement {
      border: 1px solid #b9b29a;
      border-radius: 10px;
      padding: 14px;
      margin: 12px 0;
      background: #efe4c9;
    }
    .disclaimer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #4f5a45;
      border-top: 1px solid #b9b29a;
      padding-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" height="48" alt="ET Naturals Logo">
</header>

<main>

<h1>Your Guided Plan</h1>
<div id="output" class="callout">Loading…</div>

</main>

<script>
const out = document.getElementById("output");
const raw = localStorage.getItem("ai_result");

if (!raw) {
  out.innerHTML = "<p>No plan found. Please return to the intake.</p>";
  throw new Error("Missing plan data");
}

const data = JSON.parse(raw);

/* ERROR */
if (data.state === "error") {
  out.innerHTML = `
    <h2>Something went wrong</h2>
    <p>${data.message || "Please try again."}</p>
  `;
  return;
}

/* CLARIFICATION */
if (data.state === "clarification_needed") {
  out.innerHTML = `
    <h2>We need more information</h2>
    <p>${data.clarification.reason}</p>
    <ul>${data.clarification.questions.map(q => `<li>${q}</li>`).join("")}</ul>
    <div class="disclaimer">${data.disclaimer || ""}</div>
  `;
  return;
}

/* PLAN */
const p = data.plan || {};

out.innerHTML = `
  <h2>Focus Today</h2>
  <p>${p.focus_today || ""}</p>

  ${p.plan_overview ? `
    <h3>What’s Going On</h3>
    <p>${p.plan_overview}</p>
  ` : ""}

  ${Array.isArray(p.steps) && p.steps.length ? `
    <h3>Step-by-Step</h3>
    <ul>${p.steps.map(s => `<li>${s}</li>`).join("")}</ul>
  ` : ""}

  ${Array.isArray(p.food_support) && p.food_support.length ? `
    <h3>Food Support</h3>
    <ul>${p.food_support.map(f => `<li>${f}</li>`).join("")}</ul>
  ` : ""}

  ${Array.isArray(p.hydration_and_movement) && p.hydration_and_movement.length ? `
    <h3>Hydration & Movement</h3>
    <ul>${p.hydration_and_movement.map(h => `<li>${h}</li>`).join("")}</ul>
  ` : ""}

  ${Array.isArray(p.supplements) && p.supplements.length ? `
    <h3>Supplement Support</h3>
    ${p.supplements.map(s => `
      <div class="supplement">
        <strong>${s.name || ""}</strong><br>
        ${s.how_to_take || ""}
      </div>
    `).join("")}
  ` : ""}

  ${Array.isArray(p.what_to_expect) && p.what_to_expect.length ? `
    <h3>What to Expect</h3>
    <ul>${p.what_to_expect.map(w => `<li>${w}</li>`).join("")}</ul>
  ` : ""}

  ${Array.isArray(p.red_flags_stop) && p.red_flags_stop.length ? `
    <h3>Pause & Reassess If</h3>
    <ul>${p.red_flags_stop.map(r => `<li>${r}</li>`).join("")}</ul>
  ` : ""}

  ${p.next_check_in ? `
    <h3>Next Check-In</h3>
    <p><strong>Timing:</strong> ${p.next_check_in.timing || ""}</p>
    ${Array.isArray(p.next_check_in.what_to_watch) ? `
      <ul>${p.next_check_in.what_to_watch.map(w => `<li>${w}</li>`).join("")}</ul>
    ` : ""}
  ` : ""}

  <div class="disclaimer">${data.disclaimer || ""}</div>
`;
</script>

</body>
</html>
