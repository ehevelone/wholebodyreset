<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    header img {
      height: 48px;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: #d8d1b5;
      padding: 30px;
      border-radius: 12px;
      margin-top: 30px;
    }

    h1 {
      font-size: 2.6rem;
    }

    h2 {
      margin-top: 30px;
    }

    ul {
      padding-left: 20px;
    }

    .gentle {
      font-style: italic;
      color: #4a5a4a;
    }

    .error {
      font-style: italic;
    }

    button {
      margin-top: 30px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Your Guided Plan</h1>

  <div id="content" class="card">
    <p class="gentle">Loading your plan…</p>
  </div>

</main>

<script>
const container = document.getElementById("content");

let result;
try {
  result = JSON.parse(sessionStorage.getItem("ai_result"));
} catch {
  result = null;
}

if (!result) {
  container.innerHTML = `
    <p class="error">Unable to load your plan.</p>
    <p>Please restart the intake.</p>
  `;
} 

// ✅ CLARIFICATION MODE
else if (result.state === "clarification_needed" && result.clarification) {
  container.innerHTML = `
    <h2>We Need a Little More Information</h2>
    <p class="gentle">${result.clarification.reason || ""}</p>

    <p><strong>Please answer the following:</strong></p>
    <ul>
      ${result.clarification.questions.map(q => `<li>${q}</li>`).join("")}
    </ul>

    <p class="gentle">
      Once you’ve clarified these, return to the intake or check-in so the plan can be refined.
    </p>
  `;
} 

// ✅ NORMAL PLAN MODE
else if (result.plan) {
  container.innerHTML = `
    <p><strong>Current State:</strong> ${result.state}</p>

    <p class="gentle">${result.reflection || ""}</p>

    <h2>Today's Focus</h2>
    <p>${result.plan.focus_today || ""}</p>

    <h2>What This Phase Is Doing</h2>
    <p>${result.plan.plan_overview || ""}</p>

    <h2>Step-by-Step</h2>
    <ul>
      ${(result.plan.steps || []).map(s => `<li>${s}</li>`).join("")}
    </ul>

    ${result.plan.supplements && result.plan.supplements.length ? `
      <h2>Supplement Support</h2>
      ${result.plan.supplements.map(s => `
        <p><strong>${s.name}</strong><br>
        ${s.purpose}<br>
        <em>${s.how_to_take}</em></p>
      `).join("")}
    ` : ""}

    <h2>Next Check-In</h2>
    <p><strong>Timing:</strong> ${result.plan.next_check_in?.timing || ""}</p>
  `;
}

// ❌ UNKNOWN SHAPE (DEV SAFETY)
else {
  container.innerHTML = `
    <p class="error">We received an unexpected response.</p>
    <p>Please restart the intake.</p>
  `;
}
</script>

</body>
</html>
