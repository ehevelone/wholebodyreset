<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Guided Plan | Whole Body Reset</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/site.css">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.7;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 20px;
    }

    .panel {
      background: #d9d2b5;
      border-radius: 10px;
      padding: 30px;
    }

    .error {
      font-style: italic;
    }

    ul {
      margin-top: 15px;
    }

    li {
      margin-bottom: 10px;
    }

    button {
      margin-top: 30px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    footer {
      margin-top: 80px;
      padding: 40px 20px;
      background: #e2d6b8;
      font-size: 0.9rem;
      color: #4f5a45;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>Your Guided Plan</h1>
</header>

<main>
  <div id="content" class="panel"></div>
</main>

<footer>
  <p>Educational support only. Not medical advice.</p>
</footer>

<script>
(function () {
  const container = document.getElementById("content");
  let data;

  try {
    data = JSON.parse(sessionStorage.getItem("ai_result"));
  } catch (e) {
    container.innerHTML = `
      <p class="error">Unable to load your plan. Please restart the intake.</p>
    `;
    return;
  }

  if (!data || !data.state) {
    container.innerHTML = `
      <p class="error">Unable to load your plan. Please restart the intake.</p>
    `;
    return;
  }

  /* ===========================
     CLARIFICATION MODE
  ============================ */
  if (data.state === "clarification_needed" && data.clarification) {
    container.innerHTML = `
      <h2>We Need a Little More Information</h2>
      <p>${data.clarification.reason || "To better tailor your plan, please answer the following:"}</p>
      <ul>
        ${data.clarification.questions.map(q => `<li>${q}</li>`).join("")}
      </ul>
      <p><em>Once you’ve answered these, return to the intake to continue.</em></p>
    `;
    return;
  }

  /* ===========================
     PLAN MODE
  ============================ */
  if (data.plan) {
    container.innerHTML = `
      <h2>Current State</h2>
      <p><strong>${data.state.replace("_", " ")}</strong></p>

      <h3>Today's Focus</h3>
      <p>${data.plan.focus_today}</p>

      <h3>What This Phase Is Doing</h3>
      <p>${data.plan.plan_overview}</p>

      <h3>Step-by-Step Plan</h3>
      <ul>
        ${data.plan.steps.map(s => `<li>${s}</li>`).join("")}
      </ul>

      ${data.plan.supplements?.length ? `
        <h3>Supplement Support</h3>
        ${data.plan.supplements.map(s => `
          <p><strong>${s.name}</strong>: ${s.purpose}<br>
          <em>${s.how_to_take}</em></p>
        `).join("")}
      ` : ""}

      <h3>Next Check-In</h3>
      <p>${data.plan.next_check_in?.timing}</p>
    `;
    return;
  }

  /* ===========================
     FALLBACK (SHOULD NEVER HIT)
  ============================ */
  container.innerHTML = `
    <p class="error">Unable to load your plan. Please restart the intake.</p>
  `;
})();
</script>

</body>
</html>
