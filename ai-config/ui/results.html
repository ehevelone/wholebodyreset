<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>
  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 20px;
    }

    .card {
      background: #dcd6bd;
      padding: 30px;
      border-radius: 10px;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }

    button {
      margin-top: 30px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .error {
      font-style: italic;
    }
  </style>
</head>

<body>

<header></header>

<main>
  <h1>Your Guided Plan</h1>
  <div id="content" class="card"></div>
</main>

<script>
const container = document.getElementById("content");
const aiResult = JSON.parse(sessionStorage.getItem("ai_result") || "null");

if (!aiResult) {
  container.innerHTML = "<p class='error'>Unable to load your plan. Please restart the intake.</p>";
}

/* ===============================
   CLARIFICATION MODE
================================ */
else if (aiResult.state === "clarification_needed") {
  const questions = aiResult.clarification.questions;

  let html = `
    <h2>We need a little more information</h2>
    <p>${aiResult.clarification.reason || "To better tailor your plan, please answer the following:"}</p>
    <form id="clarifyForm">
  `;

  questions.forEach((q, i) => {
    html += `
      <label>${q}</label>
      <textarea name="q_${i}" rows="3" required></textarea>
    `;
  });

  html += `
      <button type="submit">Continue</button>
    </form>
  `;

  container.innerHTML = html;

  document.getElementById("clarifyForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const original = JSON.parse(sessionStorage.getItem("intake_payload") || "{}");
    const answers = Object.fromEntries(new FormData(e.target).entries());

    const payload = {
      ...original,
      clarification_answers: answers,
      session_type: "clarification_followup"
    };

    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    sessionStorage.setItem("ai_result", JSON.stringify(result));
    window.location.reload();
  });
}

/* ===============================
   NORMAL PLAN MODE
================================ */
else if (aiResult.plan) {
  container.innerHTML = `
    <h2>${aiResult.plan.focus_today}</h2>
    <p>${aiResult.plan.plan_overview}</p>
    <ul>${aiResult.plan.steps.map(s => `<li>${s}</li>`).join("")}</ul>
  `;
}

/* ===============================
   FALLBACK ERROR
================================ */
else {
  container.innerHTML = `
    <p class="error">
      We received an unexpected response.<br><br>
      Please restart the intake.
    </p>
  `;
}
</script>

</body>
</html>
