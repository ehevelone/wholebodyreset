<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    header img {
      height: 48px;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1, h2, h3 {
      margin-top: 36px;
    }

    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 24px;
      margin: 35px 0;
    }

    .gentle {
      font-style: italic;
      color: #4a5a4a;
    }

    ul {
      padding-left: 22px;
    }

    .supplement {
      background: #efe4c9;
      border: 1px solid #b9b29a;
      border-radius: 10px;
      padding: 18px;
      margin: 20px 0;
    }

    .disclaimer {
      font-size: 0.9rem;
      color: #4f5a45;
      margin-top: 60px;
      border-top: 1px solid #b9b29a;
      padding-top: 20px;
    }

    .actions {
      margin-top: 40px;
    }

    button {
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }

    @media print {
      header, .actions {
        display: none;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Your Guided Plan</h1>

  <div id="output" class="callout"></div>

  <div class="actions">
    <button onclick="window.print()">Print / Save as PDF</button>
  </div>

</main>

<script>
const data = JSON.parse(sessionStorage.getItem("ai_result") || "{}");
const out = document.getElementById("output");

/* ==========================
   BASIC SAFETY CHECK
========================== */
if (!data || !data.state) {
  out.innerHTML = "<p>Unable to load your plan. Please restart the intake.</p>";
  throw new Error("Missing AI state");
}

/* ==========================
   CLARIFICATION MODE
========================== */
if (data.state === "clarification_needed") {
  const questions = (data.clarification?.questions || [])
    .map(q => `<li>${q}</li>`)
    .join("");

  out.innerHTML = `
    <h2>We need a little more information</h2>
    <p class="gentle">${data.clarification?.reason || ""}</p>

    <ul>${questions}</ul>

    <p class="gentle">
      Please return to the intake and add this information so the plan can be tailored correctly.
    </p>

    <div class="disclaimer">${data.disclaimer || ""}</div>
  `;
  return;
}

/* ==========================
   PLAN MODE
========================== */
if (!data.plan) {
  out.innerHTML = "<p>Plan data missing. Please restart the intake.</p>";
  throw new Error("Missing plan");
}

const plan = data.plan;

out.innerHTML = `
  <h2>Current State: ${data.state.replace(/_/g," ")}</h2>

  <p class="gentle">${plan.plan_overview || ""}</p>

  <h3>Today's Focus</h3>
  <p>${plan.focus_today || ""}</p>

  <h3>Step-by-Step Plan</h3>
  <ul>
    ${(plan.steps || []).map(s => `<li>${s}</li>`).join("")}
  </ul>

  ${
    plan.supplements && plan.supplements.length
      ? `
        <h3>Supplement Support</h3>
        ${plan.supplements.map(s => `
          <div class="supplement">
            <strong>${s.name}</strong><br>
            ${s.how_to_take}
          </div>
        `).join("")}
      `
      : ""
  }

  <h3>Food Support</h3>
  <ul>${(plan.food_support || []).map(f => `<li>${f}</li>`).join("")}</ul>

  <h3>Hydration & Movement</h3>
  <ul>${(plan.hydration_and_movement || []).map(h => `<li>${h}</li>`).join("")}</ul>

  <h3>Stop & Reassess If</h3>
  <ul>${(plan.red_flags_stop || []).map(r => `<li>${r}</li>`).join("")}</ul>

  <div class="disclaimer">${data.disclaimer || ""}</div>
`;
</script>

</body>
</html>
