<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    header img { height: 48px; }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 24px;
      margin: 35px 0;
    }

    .gentle {
      font-style: italic;
      color: #4a5a4a;
    }

    ul { padding-left: 22px; }

    button {
      margin-top: 40px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }

    .disclaimer {
      font-size: 0.9rem;
      color: #4f5a45;
      margin-top: 50px;
      border-top: 1px solid #b9b29a;
      padding-top: 20px;
    }

    @media print {
      header, button { display: none; }
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Your Guided Plan</h1>

  <div id="output" class="callout"></div>

  <button onclick="window.print()">Print / Save as PDF</button>

</main>

<script>
const data = JSON.parse(sessionStorage.getItem("ai_result") || "{}");
const out = document.getElementById("output");

if (!data.state) {
  out.innerHTML = "<p>Unable to load your plan. Please restart the intake.</p>";
}

/* ============================
   CLARIFICATION MODE
============================ */
else if (data.state === "clarification_needed") {
  out.innerHTML = `
    <h2>We Need a Little More Information</h2>
    <p class="gentle">${data.clarification?.reason || ""}</p>

    <h3>Please answer the following:</h3>
    <ul>
      ${(data.clarification?.questions || [])
        .map(q => `<li>${q}</li>`)
        .join("")}
    </ul>

    <p class="gentle">
      Once you’ve clarified these, re-submit the intake so the plan can be tailored correctly.
    </p>

    <div class="disclaimer">
      ${data.disclaimer || "Educational support only. Not medical advice."}
    </div>
  `;
}

/* ============================
   PLAN MODE
============================ */
else {
  const p = data.plan || {};

  out.innerHTML = `
    <h2>Current State: ${data.state.replace(/_/g," ")}</h2>
    <p class="gentle">${data.reflection || ""}</p>

    <h3>Today's Focus</h3>
    <p>${p.focus_today || ""}</p>

    <h3>What This Phase Is Doing</h3>
    <p>${p.plan_overview || ""}</p>

    <h3>Step-by-Step Plan</h3>
    <ul>${(p.steps || []).map(s => `<li>${s}</li>`).join("")}</ul>

    ${
      (p.supplements && p.supplements.length)
        ? `<h3>Supplement Support</h3>` +
          p.supplements.map(s => `
            <p><strong>${s.name}</strong><br>
            ${s.purpose}<br>
            <em>${s.how_to_take}</em></p>
          `).join("")
        : `<p class="gentle">No supplements are being added at this time.</p>`
    }

    <h3>Food Support</h3>
    <ul>${(p.food_support || []).map(f => `<li>${f}</li>`).join("")}</ul>

    <h3>Hydration & Movement</h3>
    <ul>${(p.hydration_and_movement || []).map(h => `<li>${h}</li>`).join("")}</ul>

    <h3>Stop & Reassess If</h3>
    <ul>${(p.red_flags_stop || []).map(r => `<li>${r}</li>`).join("")}</ul>

    <div class="disclaimer">${data.disclaimer || ""}</div>
  `;
}
</script>

</body>
</html>
