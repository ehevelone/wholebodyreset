<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
    }

    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }

    header img { height: 48px; }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: #d8d1b5;
      padding: 30px;
      border-radius: 12px;
    }

    .error {
      font-style: italic;
      color: #5a3b3b;
    }

    pre {
      background: #efe4c9;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.9rem;
    }

    h1 { font-size: 2.6rem; }
    h2 { margin-top: 30px; }
    ul { padding-left: 20px; }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>
  <h1>Your Guided Plan</h1>
  <div id="content" class="card"></div>
</main>

<script>
const container = document.getElementById("content");

let raw = sessionStorage.getItem("ai_result");

if (!raw) {
  container.innerHTML = `
    <p class="error">No plan data was found.</p>
    <p>This usually means the request did not finish before redirect.</p>
  `;
  throw new Error("ai_result missing");
}

let result;
try {
  result = JSON.parse(raw);
} catch (e) {
  container.innerHTML = `
    <p class="error">Plan data could not be read.</p>
    <pre>${raw}</pre>
  `;
  throw e;
}

/* =====================
   CLARIFICATION MODE
===================== */
if (result.state === "clarification_needed" && result.clarification) {
  container.innerHTML = `
    <h2>We Need a Little More Information</h2>
    <p>${result.clarification.reason || ""}</p>
    <ul>
      ${result.clarification.questions.map(q => `<li>${q}</li>`).join("")}
    </ul>
    <p><em>Please return to the intake to continue.</em></p>
  `;
  return;
}

/* =====================
   NORMAL PLAN MODE
===================== */
if (result.plan) {
  container.innerHTML = `
    <p><strong>Current State:</strong> ${result.state}</p>
    <p>${result.reflection || ""}</p>

    <h2>Today's Focus</h2>
    <p>${result.plan.focus_today}</p>

    <h2>Plan Overview</h2>
    <p>${result.plan.plan_overview}</p>

    <h2>Steps</h2>
    <ul>${result.plan.steps.map(s => `<li>${s}</li>`).join("")}</ul>
  `;
  return;
}

/* =====================
   FALLBACK DEBUG
===================== */
container.innerHTML = `
  <p class="error">Unexpected response shape.</p>
  <pre>${JSON.stringify(result, null, 2)}</pre>
`;
</script>

</body>
</html>
