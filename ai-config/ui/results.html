<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #efe4c9;
      color: #2f3b2f;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .callout {
      background: #d6cfb2;
      padding: 24px;
      border-radius: 12px;
    }
    .supplement {
      border: 1px solid #b9b29a;
      padding: 16px;
      border-radius: 10px;
      margin: 15px 0;
    }
    .disclaimer {
      margin-top: 40px;
      font-size: .9rem;
      color: #4f5a45;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" height="48">
</header>

<main>

<h1>Your Guided Plan</h1>
<div id="output" class="callout"></div>

</main>

<script>
const data = JSON.parse(sessionStorage.getItem("ai_result") || "{}");
const out = document.getElementById("output");

if (!data || !data.state) {
  out.innerHTML = "<p>Unable to load your plan.</p>";
  throw new Error("Missing AI data");
}

if (data.state === "clarification_needed") {
  out.innerHTML = `
    <h2>We need more information</h2>
    <p>${data.clarification.reason}</p>
    <ul>${data.clarification.questions.map(q => `<li>${q}</li>`).join("")}</ul>
    <div class="disclaimer">${data.disclaimer}</div>
  `;
  return;
}

const plan = data.plan;

out.innerHTML = `
  <h2>Focus Today</h2>
  <p>${plan.focus_today}</p>

  <h3>Steps</h3>
  <ul>${plan.steps.map(s => `<li>${s}</li>`).join("")}</ul>

  ${plan.supplements.map(s => `
    <div class="supplement">
      <strong>${s.name}</strong><br>${s.how_to_take}
    </div>
  `).join("")}

  <div class="disclaimer">${data.disclaimer}</div>
`;
</script>

</body>
</html>
