<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header { background: #e2d6b8; padding: 20px 40px; }
    header img { height: 48px; }
    main { max-width: 900px; margin: 60px auto; padding: 0 20px; }

    h1, h2, h3 { margin-top: 36px; }

    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 24px;
      margin: 35px 0;
    }

    .gentle { font-style: italic; color: #4a5a4a; }

    .supplement {
      background: #efe4c9;
      border: 1px solid #b9b29a;
      border-radius: 10px;
      padding: 18px;
      margin: 20px 0;
      page-break-inside: avoid;
    }

    .actions { margin-top: 40px; }

    button {
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }

    .disclaimer {
      font-size: 0.9rem;
      color: #4f5a45;
      margin-top: 60px;
      border-top: 1px solid #b9b29a;
      padding-top: 20px;
    }

    @media print {
      header, .actions { display: none; }
      body { background: #fff; color: #000; }
      main { margin: 0; padding: 0; max-width: none; }
      .callout { background: none; padding: 0; margin: 0; }
      @page { size: letter; margin: 0.75in; }
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>

  <h1>Your Guided Plan</h1>

  <div id="output" class="callout"></div>

  <div class="actions">
    <button onclick="window.print()">Print / Save as PDF</button>
  </div>

</main>

<script>
const current = JSON.parse(sessionStorage.getItem("ai_result") || "{}");
const out = document.getElementById("output");

/* ============================
   CLARIFICATION MODE
============================ */
if (current.state === "clarification_needed") {
  out.innerHTML = `
    <h2>We Need a Bit More Detail</h2>

    <p>${current.clarification?.reason || ""}</p>

    <ul>
      ${(current.clarification?.questions || [])
        .map(q => `<li>${q}</li>`)
        .join("")}
    </ul>

    <p class="gentle">
      Answer these questions in the intake and resubmit to continue.
      This helps the system give you accurate, safe guidance.
    </p>
  `;
  return;
}

/* ============================
   ERROR STATE
============================ */
if (!current.state || !current.plan) {
  out.innerHTML = `
    <p>
      Unable to load your plan.
      Please restart the intake.
    </p>
  `;
  return;
}

/* ============================
   NORMAL PLAN RENDER
============================ */
const supplementBlocks = (current.plan.supplements || []).map(s => `
  <div class="supplement">
    <h4>${s.name}</h4>
    <p><strong>Purpose:</strong> ${s.purpose}</p>
    <p><strong>How to take:</strong> ${s.how_to_take}</p>
    <p><strong>Adjust up:</strong> ${s.adjust_up}</p>
    <p><strong>Adjust down:</strong> ${s.adjust_down}</p>
    <p><strong>Pause / stop if:</strong> ${s.pause_or_stop_if}</p>
  </div>
`).join("");

out.innerHTML = `
  <h2>Current State: ${current.state.replace(/_/g," ")}</h2>

  <p class="gentle">${current.reflection || ""}</p>

  <h3>Today's Focus</h3>
  <p>${current.plan.focus_today}</p>

  <h3>What This Phase Is Doing</h3>
  <p>${current.plan.plan_overview}</p>

  <h3>Step-by-Step Plan</h3>
  <ul>
    ${(current.plan.steps || []).map(s => `<li>${s}</li>`).join("")}
  </ul>

  <h3>Supplement Support</h3>
  ${supplementBlocks || "<p>No supplements suggested at this time.</p>"}

  <h3>Food Support</h3>
  <ul>
    ${(current.plan.food_support || []).map(f => `<li>${f}</li>`).join("")}
  </ul>

  <h3>Hydration & Movement</h3>
  <ul>
    ${(current.plan.hydration_and_movement || []).map(h => `<li>${h}</li>`).join("")}
  </ul>

  <h3>Stop & Reassess If</h3>
  <ul>
    ${(current.plan.red_flags_stop || []).map(r => `<li>${r}</li>`).join("")}
  </ul>

  <div class="disclaimer">${current.disclaimer}</div>
`;
</script>

</body>
</html>
