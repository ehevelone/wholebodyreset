<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header { background: #e2d6b8; padding: 20px 40px; }
    header img { height: 48px; }
    main { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .callout { background: #d6cfb2; border-radius: 12px; padding: 28px; }
    textarea {
      width: 100%;
      min-height: 80px;
      margin: 10px 0 20px;
      padding: 10px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }
    button {
      margin-top: 20px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }
    .gentle { font-style: italic; color: #4a5a4a; }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>
  <h1>Your Guided Plan</h1>
  <div id="output" class="callout"></div>
</main>

<script>
const data = JSON.parse(sessionStorage.getItem("ai_result") || "{}");
const intake = JSON.parse(sessionStorage.getItem("intake_payload") || "{}");
const out = document.getElementById("output");

if (!data.state) {
  out.innerHTML = "<p>Unable to load your plan. Please restart the intake.</p>";
}

/* ============================
   CLARIFICATION MODE
============================ */
else if (data.state === "clarification_needed") {

  out.innerHTML = `
    <h2>We Need a Little More Information</h2>
    <p class="gentle">${data.clarification.reason}</p>

    <form id="clarificationForm">
      ${data.clarification.questions.map((q, i) => `
        <label><strong>${q}</strong></label>
        <textarea name="q${i}" required></textarea>
      `).join("")}
      <button type="submit">Continue</button>
    </form>

    <p class="gentle">${data.disclaimer}</p>
  `;

  document.getElementById("clarificationForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const answers = Object.fromEntries(new FormData(e.target).entries());

    const payload = {
      ...intake,
      session_type: "clarification",
      clarified_details: answers
    };

    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    sessionStorage.setItem("ai_result", JSON.stringify(result));
    window.location.reload();
  });
}

/* ============================
   PLAN MODE
============================ */
else {
  const p = data.plan;

  out.innerHTML = `
    <h2>Current State: ${data.state.replace(/_/g," ")}</h2>
    <p class="gentle">${data.reflection}</p>

    <h3>Today's Focus</h3>
    <p>${p.focus_today}</p>

    <h3>What This Phase Is Doing</h3>
    <p>${p.plan_overview}</p>

    <h3>Steps</h3>
    <ul>${p.steps.map(s => `<li>${s}</li>`).join("")}</ul>

    <p class="gentle">${data.disclaimer}</p>

    <button onclick="window.print()">Print / Save as PDF</button>
  `;
}
</script>

</body>
</html>
