<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #efe4c9;
      color: #2f3b2f;
    }
    header {
      background: #e2d6b8;
      padding: 20px 40px;
    }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .callout {
      background: #d6cfb2;
      padding: 24px;
      border-radius: 12px;
    }
    .supplement {
      border: 1px solid #b9b29a;
      padding: 16px;
      border-radius: 10px;
      margin: 15px 0;
    }
    .disclaimer {
      margin-top: 40px;
      font-size: .9rem;
      color: #4f5a45;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" height="48" alt="ET Naturals Logo">
</header>

<main>

<h1>Your Guided Plan</h1>
<div id="output" class="callout"></div>

</main>

<script>
const raw = sessionStorage.getItem("ai_result");
const data = raw ? JSON.parse(raw) : null;
const out = document.getElementById("output");

/* ==========================
   BASIC SAFETY CHECK
========================== */
if (!data || !data.state) {
  out.innerHTML = "<p>Unable to load your plan. Please restart the intake.</p>";
  throw new Error("Missing AI data");
}

/* ==========================
   CLARIFICATION MODE
========================== */
if (data.state === "clarification_needed") {
  const questions = Array.isArray(data.clarification?.questions)
    ? data.clarification.questions.map(q => `<li>${q}</li>`).join("")
    : "";

  out.innerHTML = `
    <h2>We need more information</h2>
    <p>${data.clarification?.reason || ""}</p>
    <ul>${questions}</ul>
    <div class="disclaimer">${data.disclaimer || ""}</div>
  `;
  return;
}

/* ==========================
   PLAN MODE (DEFENSIVE)
========================== */
const plan = data.plan || {};

const steps = Array.isArray(plan.steps)
  ? plan.steps.map(s => `<li>${s}</li>`).join("")
  : "";

const supplements = Array.isArray(plan.supplements)
  ? plan.supplements.map(s => `
      <div class="supplement">
        <strong>${s.name || ""}</strong><br>
        ${s.how_to_take || ""}
      </div>
    `).join("")
  : "";

out.innerHTML = `
  <h2>Focus Today</h2>
  <p>${plan.focus_today || ""}</p>

  ${steps ? `<h3>Steps</h3><ul>${steps}</ul>` : ""}

  ${supplements ? `<h3>Supplement Support</h3>${supplements}` : ""}

  <div class="disclaimer">${data.disclaimer || ""}</div>
`;
</script>

</body>
</html>
