<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Your Guided Plan | Whole Body Reset</title>

  <link rel="stylesheet" href="/css/site.css">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #efe4c9;
      color: #2f3b2f;
      line-height: 1.6;
    }
    header { background: #e2d6b8; padding: 20px 40px; }
    header img { height: 48px; }
    main { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .callout {
      background: #d6cfb2;
      border-radius: 12px;
      padding: 28px;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      margin: 12px 0 24px;
      padding: 10px;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid #b9b29a;
    }
    button {
      margin-top: 20px;
      background: #2f3b2f;
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }
    .gentle { font-style: italic; color: #4a5a4a; }
    .debug {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #665;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<header>
  <img src="/images/et-naturals-logo.png" alt="ET Naturals Logo">
</header>

<main>
  <h1>Your Guided Plan</h1>
  <div id="output" class="callout"></div>
</main>

<script>
const out = document.getElementById("output");

let data = null;
let intake = null;

try {
  data = JSON.parse(sessionStorage.getItem("ai_result"));
  intake = JSON.parse(sessionStorage.getItem("intake_payload"));
} catch (e) {}

if (!data) {
  out.innerHTML = `
    <p><strong>Session data was not found.</strong></p>
    <p>Please restart the intake so the system can continue safely.</p>
  `;
}

/* ============================
   CLARIFICATION MODE
============================ */
else if (data.state === "clarification_needed" && data.clarification) {

  out.innerHTML = `
    <h2>We Need a Little More Information</h2>
    <p class="gentle">${data.clarification.reason || ""}</p>

    <form id="clarificationForm">
      ${data.clarification.questions.map((q, i) => `
        <label><strong>${q}</strong></label>
        <textarea name="q${i}" required></textarea>
      `).join("")}

      <button type="submit">Continue</button>
    </form>

    <p class="gentle">${data.disclaimer || ""}</p>
  `;

  document.getElementById("clarificationForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const answers = Object.fromEntries(new FormData(e.target).entries());

    const payload = {
      ...intake,
      clarified_details: answers,
      session_type: "clarification"
    };

    const res = await fetch("/.netlify/functions/ai-evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    sessionStorage.setItem("ai_result", JSON.stringify(result));
    window.location.reload();
  });
}

/* ============================
   PLAN MODE
============================ */
else if (data.plan) {
  const p = data.plan;

  out.innerHTML = `
    <h2>Current State: ${data.state || "in progress"}</h2>
    <p class="gentle">${data.reflection || ""}</p>

    <h3>Today's Focus</h3>
    <p>${p.focus_today || ""}</p>

    <h3>What This Phase Is Doing</h3>
    <p>${p.plan_overview || ""}</p>

    <h3>Steps</h3>
    <ul>${(p.steps || []).map(s => `<li>${s}</li>`).join("")}</ul>

    <p class="gentle">${data.disclaimer || ""}</p>

    <button onclick="window.print()">Print / Save as PDF</button>
  `;
}

/* ============================
   FALLBACK (DEBUG SAFE)
============================ */
else {
  out.innerHTML = `
    <p><strong>We received an unexpected response.</strong></p>
    <p>Please restart the intake.</p>

    <div class="debug">
      ${JSON.stringify(data, null, 2)}
    </div>
  `;
}
</script>

</body>
</html>
